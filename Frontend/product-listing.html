<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop All Products — ShopVerse</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-loader"><div class="loader-ring"></div></div>
<div id="navbar-placeholder" data-active="shop"></div>

<div class="container py-4">
  <nav class="breadcrumb-shop"><a href="index.html">Home</a> / <span class="text-dark fw-semibold">Shop</span></nav>

  <div class="row mb-4 g-3 align-items-center">
    <div class="col-lg-7">
      <h2 class="section-title mb-0">All Products</h2>
      <p class="text-muted small mb-0" id="resultCount">Loading products...</p>
    </div>
    <div class="col-lg-5">
      <div class="search-bar-wrap">
        <i class="bi bi-search text-muted"></i>
        <input type="text" id="searchInput" placeholder="Search products...">
        <button class="btn btn-primary btn-sm-pill" onclick="applyFilters()">Search</button>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <!-- Filters Sidebar -->
    <div class="col-lg-3">
      <button class="btn btn-light-soft w-100 mb-3 d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#filterPanel">
        <i class="bi bi-funnel me-1"></i> Filters
      </button>
      <div class="collapse d-lg-block" id="filterPanel">
        <div class="filter-card mb-3">
          <h6>Category</h6>
          <div id="categoryFilters"></div>
        </div>
        <div class="filter-card mb-3">
          <h6>Price Range</h6>
          <input type="range" class="form-range range-price" id="priceRange" min="0" max="20000" step="100" value="20000" oninput="document.getElementById('priceVal').textContent = this.value">
          <div class="d-flex justify-content-between small text-muted">
            <span>₹0</span><span>Up to ₹<span id="priceVal">20000</span></span>
          </div>
        </div>
        <button class="btn btn-primary w-100" onclick="applyFilters()">Apply Filters</button>
        <button class="btn btn-light-soft w-100 mt-2" onclick="resetFilters()">Reset</button>
      </div>
    </div>

    <!-- Product Grid -->
    <div class="col-lg-9">
      <div class="d-flex justify-content-end mb-3">
        <select class="form-select w-auto" id="sortSelect" onchange="applyFilters()">
          <option value="default">Sort: Featured</option>
          <option value="priceLow">Price: Low to High</option>
          <option value="priceHigh">Price: High to Low</option>
        </select>
      </div>
      <div class="row g-4" id="productGrid"></div>
      <nav class="mt-5">
        <ul class="pagination justify-content-center" id="pagination"></ul>
      </nav>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="data/data.js"></script>
<script src="js/main.js"></script>
<script src="js/partials.js"></script>
<script>
const PER_PAGE = 8;
let currentPage = 1;
let ALL_PRODUCTS = [];
let filtered = [];

async function init(){
  try {
    const raw = await api.getProducts();
    ALL_PRODUCTS = (raw || []).map(normalizeProduct);
  } catch { ALL_PRODUCTS = []; }

  const categories = deriveCategories(ALL_PRODUCTS);
  document.getElementById('categoryFilters').innerHTML = categories.map(c => `
    <div class="form-check mb-2">
      <input class="form-check-input cat-check" type="checkbox" value="${c.name}" id="cat_${c.name}">
      <label class="form-check-label" for="cat_${c.name}">${c.name} <span class="text-muted">(${c.count})</span></label>
    </div>`).join('');

  const presetCat = new URLSearchParams(window.location.search).get('cat');
  if (presetCat) { const el = document.getElementById('cat_' + presetCat); if (el) el.checked = true; }

  applyFilters();
}

function applyFilters(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const checkedCats = [...document.querySelectorAll('.cat-check:checked')].map(c => c.value);
  const maxPrice = +document.getElementById('priceRange').value;
  const sort = document.getElementById('sortSelect').value;

  filtered = ALL_PRODUCTS.filter(p =>
    (!q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q)) &&
    (checkedCats.length === 0 || checkedCats.includes(p.category)) &&
    p.price <= maxPrice
  );

  if (sort === 'priceLow') filtered.sort((a,b) => a.price - b.price);
  if (sort === 'priceHigh') filtered.sort((a,b) => b.price - a.price);

  currentPage = 1;
  renderGrid();
}

function resetFilters(){
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.cat-check').forEach(c => c.checked = false);
  document.getElementById('priceRange').value = 20000;
  document.getElementById('priceVal').textContent = 20000;
  document.getElementById('sortSelect').value = 'default';
  filtered = [...ALL_PRODUCTS];
  currentPage = 1;
  renderGrid();
}

function renderGrid(){
  const grid = document.getElementById('productGrid');
  const start = (currentPage - 1) * PER_PAGE;
  const pageItems = filtered.slice(start, start + PER_PAGE);

  document.getElementById('resultCount').textContent = `Showing ${filtered.length ? start+1 : 0}–${Math.min(start+PER_PAGE, filtered.length)} of ${filtered.length} products`;

  grid.innerHTML = pageItems.length ? pageItems.map(productCardHtml).join('') : `
    <div class="col-12 text-center py-5">
      <i class="bi bi-search" style="font-size:2.5rem; color:var(--border);"></i>
      <h5 class="mt-3">No products found</h5>
      <p class="text-muted">Try adjusting your filters or search term.</p>
    </div>`;
  initReveal();
  renderPagination();
}

function renderPagination(){
  const totalPages = Math.ceil(filtered.length / PER_PAGE) || 1;
  const pag = document.getElementById('pagination');
  let html = `<li class="page-item ${currentPage===1?'disabled':''}"><a class="page-link" href="#" onclick="goPage(${currentPage-1});return false;"><i class="bi bi-chevron-left"></i></a></li>`;
  for (let i = 1; i <= totalPages; i++){
    html += `<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" href="#" onclick="goPage(${i});return false;">${i}</a></li>`;
  }
  html += `<li class="page-item ${currentPage===totalPages?'disabled':''}"><a class="page-link" href="#" onclick="goPage(${currentPage+1});return false;"><i class="bi bi-chevron-right"></i></a></li>`;
  pag.innerHTML = html;
}

function goPage(p){
  const totalPages = Math.ceil(filtered.length / PER_PAGE) || 1;
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderGrid();
  window.scrollTo({ top: 200, behavior: 'smooth' });
}

document.getElementById('searchInput').addEventListener('keyup', e => { if (e.key === 'Enter') applyFilters(); });

init();
</script>
</body>
</html>
