<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart — ShopVerse</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-loader"><div class="loader-ring"></div></div>
<div id="navbar-placeholder" data-active="shop"></div>

<div class="container py-4">
  <nav class="breadcrumb-shop"><a href="index.html">Home</a> / <span class="text-dark fw-semibold">Shopping Cart</span></nav>
  <h2 class="section-title mb-4">Your Shopping Cart</h2>

  <div id="cartContent"></div>
</div>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="data/data.js"></script>
<script src="js/main.js"></script>
<script src="js/partials.js"></script>
<script>
async function renderCart(){
  const user = await Auth.getCurrentUser();
  if (!user){ window.location.href = 'login.html'; return; }

  const items = await Cart.load();
  const el = document.getElementById('cartContent');

  if (!items.length){
    el.innerHTML = `
      <div class="text-center py-5">
        <i class="bi bi-cart-x" style="font-size:3.5rem; color:var(--border);"></i>
        <h4 class="mt-3">Your cart is empty</h4>
        <p class="text-muted">Looks like you haven't added anything yet.</p>
        <a href="product-listing.html" class="btn btn-primary btn-lg mt-2">Continue Shopping</a>
      </div>`;
    return;
  }

  const subtotal = Cart.total();
  const shipping = subtotal > 2000 ? 0 : 99;
  const tax = Math.round(subtotal * 0.05);
  const total = subtotal + shipping + tax;

  el.innerHTML = `
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="table-responsive">
          <table class="table cart-table align-middle">
            <thead><tr class="text-muted small text-uppercase"><th>Product</th><th>Price</th><th>Quantity</th><th>Total</th><th></th></tr></thead>
            <tbody id="cartRows">
              ${items.map(i => `
                <tr class="cart-row reveal in">
                  <td>
                    <div class="d-flex align-items-center gap-3">
                      <img src="${i.imageUrl || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200&q=80'}" alt="${i.productName}">
                      <div>
                        <div class="fw-semibold">${i.productName}</div>
                      </div>
                    </div>
                  </td>
                  <td>₹${i.price.toLocaleString('en-IN')}</td>
                  <td>
                    <div class="qty-selector">
                      <button onclick="updateRow(${i.cartId}, ${i.quantity - 1})">−</button>
                      <input type="text" value="${i.quantity}" readonly>
                      <button onclick="updateRow(${i.cartId}, ${i.quantity + 1})">+</button>
                    </div>
                  </td>
                  <td class="fw-bold">₹${(i.price * i.quantity).toLocaleString('en-IN')}</td>
                  <td><button class="btn btn-sm text-danger" onclick="removeRow(${i.cartId})"><i class="bi bi-trash3"></i></button></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
        <a href="product-listing.html" class="btn btn-light-soft"><i class="bi bi-arrow-left me-1"></i> Continue Shopping</a>
      </div>
      <div class="col-lg-4">
        <div class="summary-card">
          <h5 class="mb-3">Order Summary</h5>
          <div class="summary-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString('en-IN')}</span></div>
          <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? 'FREE' : '₹'+shipping}</span></div>
          <div class="summary-row"><span>Tax (5%)</span><span>₹${tax.toLocaleString('en-IN')}</span></div>
          <div class="summary-row total"><span>Total</span><span>₹${total.toLocaleString('en-IN')}</span></div>
          <a href="checkout.html" class="btn btn-coral btn-lg w-100 mt-3">Proceed to Checkout <i class="bi bi-arrow-right ms-1"></i></a>
        </div>
      </div>
    </div>`;
}

async function updateRow(cartId, qty){
  if (qty < 1) return removeRow(cartId);
  try { await Cart.updateQty(cartId, qty); renderCart(); } catch {}
}
async function removeRow(cartId){
  try { await Cart.remove(cartId); renderCart(); } catch {}
}

renderCart();
</script>
</body>
</html>
