<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — ShopVerse</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="page-loader"><div class="loader-ring"></div></div>
<div class="auth-wrap" style="background:var(--ink);">
  <div class="auth-bg-orb" style="width:300px;height:300px;top:-80px;left:-60px;"></div>
  <div class="auth-bg-orb" style="width:200px;height:200px;bottom:-40px;right:8%;"></div>
  <div class="auth-card">
    <div class="text-center mb-3">
      <span class="cat-icon mx-auto" style="margin-bottom:1rem;"><i class="bi bi-shield-lock-fill"></i></span>
    </div>
    <h3 class="text-center mb-1">Admin Console</h3>
    <p class="text-center text-muted small mb-4">Restricted access — authorized personnel only.</p>

    <form id="adminLoginForm" novalidate>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Admin Email</label>
        <input type="email" class="form-control" id="adminEmail" placeholder="admin@shopverse.com" required>
        <div class="invalid-feedback">Enter a valid admin email.</div>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Password</label>
        <input type="password" class="form-control" id="adminPassword" placeholder="Enter admin password" required minlength="6">
        <div class="invalid-feedback">Password must be at least 6 characters.</div>
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="adminRemember">
        <label class="form-check-label small" for="adminRemember">Keep me signed in on this device</label>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">Sign In to Dashboard</button>
    </form>
    <p class="text-center small text-muted mt-4 mb-0"><a href="../index.html" class="text-violet fw-semibold"><i class="bi bi-arrow-left me-1"></i>Back to Store</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../data/data.js"></script>
<script src="../js/main.js"></script>
<script>
document.getElementById('adminLoginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  if (!this.checkValidity()){ this.classList.add('was-validated'); return; }
  const btn = this.querySelector('button[type=submit]');
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Authenticating...';
  try {
    console.log("Before Login");

    const user = await api.login({
        email: document.getElementById('adminEmail').value,
        password: document.getElementById('adminPassword').value
    });

    console.log("After Login");
    console.log(user);

    alert(JSON.stringify(user));

    if (user.role !== 'ADMIN') {
        alert("Role = " + user.role);
        showToast('This login is for administrators only');
        await api.logout();
        return;
    }

    alert("Redirecting...");
    window.location.href = "dashboard.html";

} catch (err) {
    console.error(err);
    alert("ERROR : " + err.message);
}
});


</script>
</body>
</html>
