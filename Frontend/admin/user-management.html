<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Management — Shop_With_Sahil Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="page-loader"><div class="loader-ring"></div></div>
<div id="admin-sidebar-placeholder" data-active="users"></div>

<main class="admin-main">
  <div id="admin-topbar-placeholder" data-title="User Management" data-subtitle="View and manage registered customers."></div>

  <div class="admin-card reveal">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <h6 class="fw-bold mb-0">All Users (<span id="userCount">0</span>)</h6>
      <input type="text" class="form-control w-auto" placeholder="Search by name or email..." id="userSearch" oninput="renderUsers()">
    </div>
    <div class="table-responsive">
      <table class="table table-admin mb-0">
        <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="userTableBody"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- View user modal -->
<div class="modal fade" id="userModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:18px;">
      <div class="modal-header border-0">
        <h5 class="modal-title">User Details</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="userModalBody"></div>
      <div class="modal-footer border-0">
        <button class="btn btn-light-soft" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../data/data.js"></script>
<script src="../js/main.js"></script>
<script src="../js/admin-partials.js"></script>
<script>
let users = [];

async function loadUsers(){
  try { users = (await api.getAllUsersAdmin()) || []; }
  catch { users = []; }
  renderUsers();
}

function renderUsers(){
  const q = document.getElementById('userSearch').value.toLowerCase();
  const list = users.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q));
  document.getElementById('userCount').textContent = users.length;
  document.getElementById('userTableBody').innerHTML = list.length ? list.map(u => `
    <tr>
      <td><div class="d-flex align-items-center gap-2">
        <img src="https://i.pravatar.cc/100?u=${u.id}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
        <span class="fw-semibold small">${u.name}</span>
      </div></td>
      <td class="small">${u.email}</td>
      <td class="small">${u.role}</td>
      <td><span class="badge-status ${(u.status || 'ACTIVE') === 'ACTIVE' ? 'badge-active' : 'badge-blocked'}">${u.status || 'ACTIVE'}</span></td>
      <td>
        <button class="btn btn-sm btn-light-soft me-1" onclick='viewUser(${JSON.stringify(u).replace(/'/g,"&apos;")})'><i class="bi bi-eye"></i></button>
        <button class="btn btn-sm btn-light-soft" onclick="toggleStatus(${u.id}, '${u.status || 'ACTIVE'}')">
          <i class="bi bi-${(u.status || 'ACTIVE') === 'ACTIVE' ? 'lock' : 'unlock'}"></i>
        </button>
      </td>
    </tr>`).join('') : '<tr><td colspan="5" class="text-center text-muted py-3">No users found.</td></tr>';
}

function viewUser(u){
  document.getElementById('userModalBody').innerHTML = `
    <div class="text-center mb-3">
      <img src="https://i.pravatar.cc/100?u=${u.id}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">
      <h5 class="mt-2 mb-0">${u.name}</h5>
      <span class="badge-status ${(u.status||'ACTIVE')==='ACTIVE'?'badge-active':'badge-blocked'}">${u.status||'ACTIVE'}</span>
    </div>
    <div class="row small g-2">
      <div class="col-5"><strong>Email:</strong></div><div class="col-7">${u.email}</div>
      <div class="col-5"><strong>Role:</strong></div><div class="col-7">${u.role}</div>
    </div>`;
  new bootstrap.Modal(document.getElementById('userModal')).show();
}

async function toggleStatus(id, currentStatus){
  const newStatus = currentStatus === 'ACTIVE' ? 'BLOCKED' : 'ACTIVE';
  try {
    await api.updateUserStatus(id, newStatus);
    const u = users.find(x => x.id === id);
    if (u) u.status = newStatus;
    renderUsers();
    showToast(`User ${newStatus === 'ACTIVE' ? 'unblocked' : 'blocked'} successfully`);
  } catch {}
}

loadUsers();
initReveal();
</script>
</body>
</html>
