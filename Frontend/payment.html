<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment — ShopVerse</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-loader"><div class="loader-ring"></div></div>
<div id="navbar-placeholder" data-active="shop"></div>

<div class="container py-4">
  <div class="steps-track">
    <div class="step-item done"><div class="step-circle"><i class="bi bi-check-lg"></i></div><span class="label">Cart</span></div>
    <div class="step-item done"><div class="step-circle"><i class="bi bi-check-lg"></i></div><span class="label">Shipping</span></div>
    <div class="step-item active"><div class="step-circle">3</div><span class="label">Payment</span></div>
    <div class="step-item"><div class="step-circle">4</div><span class="label">Confirmation</span></div>
  </div>

  <div class="row g-4 justify-content-center">
    <div class="col-lg-5">
      <div class="credit-card-preview" id="ccPreview">
        <div class="d-flex justify-content-between align-items-start">
          <div class="cc-chip"></div>
          <i class="bi bi-wifi fs-5" style="transform:rotate(90deg);"></i>
        </div>
        <div class="cc-number" id="ccNumberPreview">•••• •••• •••• ••••</div>
        <div class="cc-row">
          <div>Card Holder<strong id="ccNamePreview">YOUR NAME</strong></div>
          <div>Expires<strong id="ccExpPreview">MM/YY</strong></div>
        </div>
      </div>

      <div class="filter-card">
        <h6 class="mb-3">Total Payable</h6>
        <h3 class="text-violet" id="payTotal">₹0</h3>
        <p class="text-muted small mb-0"><i class="bi bi-shield-lock me-1"></i>256-bit SSL encrypted secure payment</p>
      </div>
    </div>

    <div class="col-lg-6">
      <div class="filter-card">
        <h5 class="mb-4"><i class="bi bi-credit-card-2-front me-2 text-violet"></i>Card Details</h5>
        <form id="paymentForm" novalidate>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Card Number</label>
            <input type="text" class="form-control" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required pattern="[0-9\s]{19}">
            <div class="invalid-feedback">Enter a valid 16-digit card number.</div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Card Holder Name</label>
            <input type="text" class="form-control" id="cardName" placeholder="As shown on card" required>
            <div class="invalid-feedback">Card holder name is required.</div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label small fw-semibold">Expiry Date</label>
              <input type="text" class="form-control" id="cardExpiry" placeholder="MM/YY" maxlength="5" required pattern="(0[1-9]|1[0-2])\/[0-9]{2}">
              <div class="invalid-feedback">Use MM/YY format.</div>
            </div>
            <div class="col-6">
              <label class="form-label small fw-semibold">CVV</label>
              <input type="password" class="form-control" id="cardCvv" placeholder="123" maxlength="3" required pattern="[0-9]{3}" onfocus="flipCard(true)" onblur="flipCard(false)">
              <div class="invalid-feedback">Enter a valid 3-digit CVV.</div>
            </div>
          </div>
          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" id="saveCard">
            <label class="form-check-label small" for="saveCard">Save this card for future payments</label>
          </div>
          <button type="submit" class="btn btn-coral btn-lg w-100" id="payBtn"><i class="bi bi-lock-fill me-1"></i> Pay Now</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="data/data.js"></script>
<script src="data/data.js"></script>
<script src="js/main.js"></script>
<script src="js/partials.js"></script>
<script>
const total = +localStorage.getItem('shopverse_total') || 0;
document.getElementById('payTotal').textContent = '₹' + total.toLocaleString('en-IN');

const cardNumber = document.getElementById('cardNumber');
cardNumber.addEventListener('input', e => {
  let v = e.target.value.replace(/\D/g,'').slice(0,16);
  v = v.replace(/(.{4})/g,'$1 ').trim();
  e.target.value = v;
  document.getElementById('ccNumberPreview').textContent = v ? v.padEnd(19,'•') : '•••• •••• •••• ••••';
});

document.getElementById('cardName').addEventListener('input', e => {
  document.getElementById('ccNamePreview').textContent = e.target.value.toUpperCase() || 'YOUR NAME';
});

document.getElementById('cardExpiry').addEventListener('input', e => {
  let v = e.target.value.replace(/\D/g,'').slice(0,4);
  if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2);
  e.target.value = v;
  document.getElementById('ccExpPreview').textContent = v || 'MM/YY';
});

document.getElementById('cardCvv').addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g,'').slice(0,3);
});

function flipCard(flip){
  document.getElementById('ccPreview').classList.toggle('flipped', flip);
}

// Real-time validity styling
['cardNumber','cardName','cardExpiry','cardCvv'].forEach(id => {
  document.getElementById(id).addEventListener('blur', e => {
    e.target.classList.toggle('is-valid', e.target.checkValidity());
    e.target.classList.toggle('is-invalid', !e.target.checkValidity());
  });
});

document.getElementById('paymentForm').addEventListener('submit', async function(e){
  e.preventDefault();
  if (!this.checkValidity()){ this.classList.add('was-validated'); showToast('Please check your card details'); return; }
  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processing payment...';

  // Card details are validated client-side only — this demo backend does not
  // process real payments, it simply records the chosen payment method.
  setTimeout(async () => {
    try {
      await api.placeOrder(
        localStorage.getItem('shopverse_shipping_address'),
        localStorage.getItem('shopverse_payment_method') || 'CARD'
      );
      window.location.href = 'order-confirmation.html';
    } catch {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-lock-fill me-1"></i> Pay Now';
    }
  }, 1200);
});
</script>
</body>
</html>
