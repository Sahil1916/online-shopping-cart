<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wishlist — ShopWith_Sahil</title>
<meta name="description" content="View and manage the products you've saved for later on Shop_With_Sahil.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-loader"><div class="loader-ring"></div></div>
<div id="navbar-placeholder" data-active="wishlist"></div>

<div class="container py-4">
  <nav class="breadcrumb-shop"><a href="index.html">Home</a> / <span class="text-dark fw-semibold">My Wishlist</span></nav>

  <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
    <div>
      <h2 class="section-title mb-0">My Wishlist</h2>
      <p class="text-muted small mb-0" id="wishlistCount">0 items saved</p>
    </div>
    <button class="btn btn-light-soft" id="clearWishlistBtn" onclick="clearWishlist()"><i class="bi bi-trash3 me-1"></i> Clear All</button>
  </div>

  <div id="wishlistContent" class="row g-4"></div>
</div>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="data/data.js"></script>
<script src="js/main.js"></script>
<script src="js/partials.js"></script>
<script>
function renderWishlist(){
  const items = Wishlist.get();
  const wrap = document.getElementById('wishlistContent');
  document.getElementById('wishlistCount').textContent = `${items.length} item${items.length === 1 ? '' : 's'} saved`;
  document.getElementById('clearWishlistBtn').classList.toggle('d-none', items.length === 0);

  if (!items.length){
    wrap.innerHTML = `
      <div class="col-12 text-center py-5">
        <i class="bi bi-heart" style="font-size:3.5rem; color:var(--border);"></i>
        <h4 class="mt-3">Your wishlist is empty</h4>
        <p class="text-muted">Tap the heart icon on any product to save it here for later.</p>
        <a href="product-listing.html" class="btn btn-primary btn-lg mt-2">Explore Products</a>
      </div>`;
    return;
  }

  wrap.innerHTML = items.map(p => {
    const off = p.mrp ? Math.round((1 - p.price / p.mrp) * 100) : 0;
    return `
    <div class="col-6 col-md-4 col-lg-3 reveal in">
      <div class="product-card">
        <a href="product-details.html?id=${p.id}" class="product-img-wrap d-block">
          ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
          <img src="${p.img}" alt="${p.name}" loading="lazy">
        </a>
        <button class="wishlist-btn is-active" title="Remove from wishlist" onclick="event.preventDefault(); removeFromWishlist(${p.id})"><i class="bi bi-heart-fill"></i></button>
        <div class="p-3">
          <div class="product-cat">${p.category}</div>
          <a href="product-details.html?id=${p.id}"><div class="product-name">${p.name}</div></a>
          <div class="d-flex align-items-center gap-2 mb-1">
            <span class="rating-pill">${p.rating} <i class="bi bi-star-fill" style="font-size:.6rem"></i></span>
            <small class="text-muted">(${p.reviews})</small>
          </div>
          <div class="d-flex align-items-center gap-2 flex-wrap">
            <span class="price-now">₹${p.price.toLocaleString('en-IN')}</span>
            ${p.mrp ? `<span class="price-mrp">₹${p.mrp.toLocaleString('en-IN')}</span><span class="price-off">${off}% off</span>` : ''}
          </div>
          <button class="btn btn-primary w-100 mt-2 btn-sm-pill" onclick="moveToCart(${p.id})">
            <i class="bi bi-cart-plus me-1"></i> Move to Cart
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function removeFromWishlist(id){
  Wishlist.remove(id);
  showToast('Removed from wishlist');
  renderWishlist();
}

async function moveToCart(id){
  const user = await Auth.getCurrentUser();
  if (!user){ window.location.href = 'login.html'; return; }
  try {
    await Cart.add(id, 1);
    Wishlist.remove(id);
    renderWishlist();
  } catch {}
}

function clearWishlist(){
  Wishlist.clear();
  showToast('Wishlist cleared');
  renderWishlist();
}

renderWishlist();
</script>
</body>
</html>
