<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — ShopVerse</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
<style>@media print{ #navbar-placeholder, #footer-placeholder, .no-print{display:none !important;} }</style>
</head>
<body>
<div class="page-loader"><div class="loader-ring"></div></div>
<div id="navbar-placeholder" data-active="shop"></div>

<div class="container py-5" style="max-width:760px;">
  <div class="text-center mb-5">
    <div class="success-check"><i class="bi bi-check-lg"></i></div>
    <h2 class="mb-2">Order Placed Successfully!</h2>
    <p class="text-muted">Thank you for shopping with ShopVerse. A confirmation email is on its way.</p>
  </div>

  <div class="invoice-box" id="invoiceBox"></div>

  <div class="d-flex gap-3 justify-content-center mt-4 no-print">
    <button class="btn btn-light-soft btn-lg" onclick="window.print()"><i class="bi bi-printer me-1"></i> Print Invoice</button>
    <a href="product-listing.html" class="btn btn-coral btn-lg"><i class="bi bi-bag me-1"></i> Continue Shopping</a>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="data/data.js"></script>
<script src="js/main.js"></script>
<script src="js/partials.js"></script>
<script>
async function loadConfirmation(){
  const user = await Auth.getCurrentUser();
  if (!user){ window.location.href = 'login.html'; return; }

  let order, items, products;
  try {
    const myOrders = await api.getMyOrders(); // most recent first is not guaranteed, so sort by id desc
    const latest = (myOrders || []).sort((a,b) => b.id - a.id)[0];
    if (!latest) throw new Error('No orders found');

    const details = await api.getOrderDetails(latest.id);
    order = details.order;
    items = details.items || [];

    const rawProducts = await api.getProducts();
    products = (rawProducts || []).map(normalizeProduct);
  } catch {
    document.getElementById('invoiceBox').innerHTML = `<div class="text-center py-4"><p class="text-muted">No recent order found.</p><a href="product-listing.html" class="btn btn-primary">Start Shopping</a></div>`;
    return;
  }

  const dateStr = order.orderDate ? new Date(order.orderDate).toLocaleDateString('en-IN', { year:'numeric', month:'long', day:'numeric' }) : new Date().toLocaleDateString('en-IN');

  document.getElementById('invoiceBox').innerHTML = `
    <div class="d-flex justify-content-between flex-wrap mb-4 pb-3 border-bottom">
      <div>
        <h5 class="mb-1">Order #${order.id}</h5>
        <small class="text-muted">Placed on ${dateStr}</small>
      </div>
      <span class="badge text-bg-success align-self-start rounded-pill px-3 py-2">${order.status || 'PENDING'}</span>
    </div>
    <div class="row mb-4">
      <div class="col-md-6">
        <h6 class="text-violet small text-uppercase">Customer Details</h6>
        <p class="mb-0 small">${user.name}</p>
      </div>
      <div class="col-md-6">
        <h6 class="text-violet small text-uppercase">Shipping Address</h6>
        <p class="mb-0 small">${order.shippingAddress || 'Not provided'}</p>
      </div>
    </div>
    <h6 class="text-violet small text-uppercase mb-3">Order Items</h6>
    <table class="table">
      <thead><tr class="small text-muted"><th>Product</th><th>Qty</th><th class="text-end">Price</th></tr></thead>
      <tbody>
        ${items.map(i => {
          const p = products.find(pr => pr.id === i.productId);
          return `
          <tr>
            <td><div class="d-flex align-items-center gap-2"><img src="${p ? p.img : 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=100&q=80'}" style="width:44px;height:44px;border-radius:8px;object-fit:cover;"><span class="small">${p ? p.name : 'Product #' + i.productId}</span></div></td>
            <td>${i.quantity}</td>
            <td class="text-end">₹${(i.price*i.quantity).toLocaleString('en-IN')}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div class="d-flex justify-content-end">
      <div style="min-width:240px;">
        <div class="summary-row total"><span>Total Paid</span><span>₹${Number(order.totalAmount).toLocaleString('en-IN')}</span></div>
      </div>
    </div>`;
}

loadConfirmation();
</script>
</body>
</html>
