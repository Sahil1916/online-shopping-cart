<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — ShopVerse</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-loader"><div class="loader-ring"></div></div>
<div id="navbar-placeholder" data-active="shop"></div>

<div class="container py-4">
  <div class="steps-track">
    <div class="step-item done"><div class="step-circle"><i class="bi bi-check-lg"></i></div><span class="label">Cart</span></div>
    <div class="step-item active"><div class="step-circle">2</div><span class="label">Shipping</span></div>
    <div class="step-item"><div class="step-circle">3</div><span class="label">Payment</span></div>
    <div class="step-item"><div class="step-circle">4</div><span class="label">Confirmation</span></div>
  </div>

  <div class="row g-4">
    <div class="col-lg-7">
      <div class="filter-card mb-4">
        <h5 class="mb-3"><i class="bi bi-truck me-2 text-violet"></i>Shipping Details</h5>
        <form id="shippingForm" class="row g-3" novalidate>
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Full Name</label>
            <input type="text" class="form-control" id="shipName" required>
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Phone Number</label>
            <input type="tel" class="form-control" id="shipPhone" pattern="[0-9]{10}" required>
          </div>
          <div class="col-12">
            <label class="form-label small fw-semibold">Address</label>
            <input type="text" class="form-control" id="shipAddress" placeholder="House no, street, area" required>
          </div>
          <div class="col-md-5">
            <label class="form-label small fw-semibold">City</label>
            <input type="text" class="form-control" id="shipCity" required>
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-semibold">State</label>
            <input type="text" class="form-control" id="shipState" required>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-semibold">PIN Code</label>
            <input type="text" class="form-control" id="shipPincode" pattern="[0-9]{6}" required>
          </div>
        </form>
      </div>

      <div class="filter-card">
        <h5 class="mb-3"><i class="bi bi-credit-card me-2 text-violet"></i>Payment Method</h5>
        <div class="payment-method-card active mb-2" data-method="CARD" onclick="selectPay(this)"><i class="bi bi-credit-card-2-front me-2"></i> Credit / Debit Card</div>
        <div class="payment-method-card mb-2" data-method="UPI" onclick="selectPay(this)"><i class="bi bi-phone me-2"></i> UPI</div>
        <div class="payment-method-card" data-method="COD" onclick="selectPay(this)"><i class="bi bi-cash-stack me-2"></i> Cash on Delivery</div>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="summary-card">
        <h5 class="mb-3">Order Summary</h5>
        <div id="checkoutItems" class="mb-3"></div>
        <div class="summary-row"><span>Subtotal</span><span id="sumSub">₹0</span></div>
        <div class="summary-row"><span>Shipping</span><span id="sumShip">₹0</span></div>
        <div class="summary-row"><span>Tax (5%)</span><span id="sumTax">₹0</span></div>
        <div class="summary-row total"><span>Total</span><span id="sumTotal">₹0</span></div>
        <button class="btn btn-coral btn-lg w-100 mt-3" onclick="goToPayment()">Continue to Payment <i class="bi bi-arrow-right ms-1"></i></button>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="data/data.js"></script>
<script src="js/main.js"></script>
<script src="js/partials.js"></script>
<script>
let selectedPayMethod = 'CARD';

async function init(){
  const user = await Auth.getCurrentUser();
  if (!user){ window.location.href = 'login.html'; return; }

  const items = await Cart.load();
  if (!items.length){ window.location.href = 'cart.html'; return; }

  document.getElementById('checkoutItems').innerHTML = items.map(i => `
    <div class="d-flex justify-content-between small mb-2">
      <span>${i.productName} <span class="text-muted">x${i.quantity}</span></span>
      <span class="fw-semibold">₹${(i.price*i.quantity).toLocaleString('en-IN')}</span>
    </div>`).join('');

  const subtotal = Cart.total();
  const shipping = subtotal > 2000 ? 0 : 99;
  const tax = Math.round(subtotal * 0.05);
  const total = subtotal + shipping + tax;
  document.getElementById('sumSub').textContent = '₹' + subtotal.toLocaleString('en-IN');
  document.getElementById('sumShip').textContent = shipping === 0 ? 'FREE' : '₹' + shipping;
  document.getElementById('sumTax').textContent = '₹' + tax.toLocaleString('en-IN');
  document.getElementById('sumTotal').textContent = '₹' + total.toLocaleString('en-IN');

  window._checkoutTotal = total;

  // Prefill name from logged-in user
  document.getElementById('shipName').value = user.name || '';
}

function selectPay(el){
  document.querySelectorAll('.payment-method-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selectedPayMethod = el.dataset.method;
}

function goToPayment(){
  const form = document.getElementById('shippingForm');
  if (!form.checkValidity()){ form.classList.add('was-validated'); showToast('Please complete shipping details'); return; }

  const shippingAddress = [
    document.getElementById('shipName').value,
    document.getElementById('shipPhone').value,
    document.getElementById('shipAddress').value,
    document.getElementById('shipCity').value,
    document.getElementById('shipState').value,
    document.getElementById('shipPincode').value
  ].join(', ');

  localStorage.setItem('shopverse_shipping_address', shippingAddress);
  localStorage.setItem('shopverse_payment_method', selectedPayMethod);
  localStorage.setItem('shopverse_total', window._checkoutTotal);

  if (selectedPayMethod === 'COD'){
    // No card details needed — place the order directly
    placeOrderAndRedirect();
  } else {
    window.location.href = 'payment.html';
  }
}

async function placeOrderAndRedirect(){
  try {
    await api.placeOrder(
      localStorage.getItem('shopverse_shipping_address'),
      localStorage.getItem('shopverse_payment_method')
    );
    window.location.href = 'order-confirmation.html';
  } catch {}
}

init();
</script>
</body>
</html>
