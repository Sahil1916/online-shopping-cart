<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ShopVerse</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-loader"><div class="loader-ring"></div></div>
<div class="auth-wrap">
  <div class="auth-bg-orb" style="width:300px;height:300px;top:-80px;right:-60px;"></div>
  <div class="auth-bg-orb" style="width:180px;height:180px;bottom:-30px;left:8%;"></div>
  <div class="auth-card">
    <a href="index.html" class="brand-logo justify-content-center d-flex mb-3"><i class="bi bi-bag-check-fill text-violet"></i> Shop<span class="dot">Verse</span></a>
    <h3 class="text-center mb-1">Welcome back</h3>
    <p class="text-center text-muted small mb-4">Log in to continue shopping.</p>

    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
        <div class="invalid-feedback">Enter a valid email address.</div>
      </div>
      <div class="mb-2">
        <label class="form-label small fw-semibold">Password</label>
        <div class="position-relative">
          <input type="password" class="form-control" id="password" placeholder="Enter your password" required minlength="6">
          <i class="bi bi-eye position-absolute" style="right:14px; top:12px; cursor:pointer; color:var(--slate-light);" onclick="togglePw('password', this)"></i>
        </div>
        <div class="invalid-feedback">Password must be at least 6 characters.</div>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember">
          <label class="form-check-label small" for="remember">Remember me</label>
        </div>
        <a href="#" class="small text-violet fw-semibold" data-bs-toggle="modal" data-bs-target="#forgotModal">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">Log In</button>
      <div class="text-center my-3 text-muted small">— or continue with —</div>
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light-soft w-50" onclick="showToast('Google sign-in not available in demo')"><i class="bi bi-google me-1"></i> Google</button>
        <button type="button" class="btn btn-light-soft w-50" onclick="showToast('Facebook sign-in not available in demo')"><i class="bi bi-facebook me-1"></i> Facebook</button>
      </div>
    </form>
    <p class="text-center small text-muted mt-4 mb-0">New to ShopVerse? <a href="register.html" class="text-violet fw-semibold">Create an account</a></p>
  </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal fade" id="forgotModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:18px;">
      <div class="modal-header border-0">
        <h5 class="modal-title">Reset your password</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small">Enter your registered email and we'll send a password reset link.</p>
        <input type="email" class="form-control" placeholder="you@example.com">
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-light-soft" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" data-bs-dismiss="modal" onclick="showToast('Password reset link sent to your email')">Send Link</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="data/data.js"></script>
<script src="js/main.js"></script>
<script>
function togglePw(id, icon){
  const input = document.getElementById(id);
  const isPw = input.type === 'password';
  input.type = isPw ? 'text' : 'password';
  icon.classList.toggle('bi-eye'); icon.classList.toggle('bi-eye-slash');
}
document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  if (!this.checkValidity()){ this.classList.add('was-validated'); return; }
  const btn = this.querySelector('button[type=submit]');
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
  try {
    const user = await api.login({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    });
    if (user.role !== 'CUSTOMER'){
      showToast('Please use the admin login page');
      await api.logout();
      btn.disabled = false; btn.innerHTML = originalText;
      return;
    }
    window.location.href = 'index.html';
  } catch {
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
});
</script>
</body>
</html>
