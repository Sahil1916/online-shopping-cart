<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details — ShopWith_Sahil</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-loader"><div class="loader-ring"></div></div>
<div id="navbar-placeholder" data-active="shop"></div>

<div class="container py-4" id="pdContainer">
  <div class="row g-3">
    <div class="col-12"><div class="skeleton" style="height:24px;width:300px;"></div></div>
    <div class="col-lg-6"><div class="skeleton" style="height:420px;border-radius:18px;"></div></div>
    <div class="col-lg-6">
      <div class="skeleton mb-2" style="height:32px;width:70%;"></div>
      <div class="skeleton mb-2" style="height:20px;width:40%;"></div>
      <div class="skeleton mb-3" style="height:60px;"></div>
      <div class="skeleton" style="height:48px;width:200px;"></div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="data/data.js"></script>
<script src="js/main.js"></script>
<script src="js/partials.js"></script>
<script>
const id = +new URLSearchParams(window.location.search).get('id');
let product = null;
let related = [];
let qty = 1;

async function loadAndRender(){
  if (!id){ window.location.href = 'product-listing.html'; return; }
  try {
    const raw = await api.getProduct(id);
    product = normalizeProduct(raw);
  } catch {
    document.getElementById('pdContainer').innerHTML = `<div class="text-center py-5"><h5>Product not found</h5><a href="product-listing.html" class="btn btn-primary mt-2">Back to Shop</a></div>`;
    return;
  }

  try {
    const all = (await api.getProducts() || []).map(normalizeProduct);
    related = all.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
  } catch { related = []; }

  renderPD();
}

function renderPD(){
  const off = product.mrp ? Math.round((1 - product.price / product.mrp) * 100) : 0;
  document.getElementById('pdContainer').innerHTML = `
    <nav class="breadcrumb-shop"><a href="index.html">Home</a> / <a href="product-listing.html">Shop</a> / <span class="text-dark fw-semibold">${product.name}</span></nav>
    <div class="row g-5">
      <div class="col-lg-6">
        <div class="pd-gallery-main mb-3"><img id="mainImg" src="${product.img}" alt="${product.name}"></div>
      </div>
      <div class="col-lg-6">
        <div class="product-cat">${product.category}</div>
        <h2 class="mb-2">${product.name}</h2>
        <div class="d-flex align-items-center gap-3 mb-3">
          <span class="price-now fs-2">₹${product.price.toLocaleString('en-IN')}</span>
          ${product.mrp ? `<span class="price-mrp fs-5">₹${product.mrp.toLocaleString('en-IN')}</span><span class="price-off fs-6">${off}% off</span>` : ''}
        </div>
        <p class="text-muted">${product.description || ''}</p>
        <div class="mb-3">
          <span class="badge ${product.qty <= 0 ? 'text-bg-danger' : product.qty < 15 ? 'text-bg-warning' : 'text-bg-success'} rounded-pill px-3 py-2">
            <i class="bi bi-box-seam me-1"></i> ${product.qty > 0 ? product.qty + ' units available' : 'Out of stock'}
          </span>
        </div>
        <div class="d-flex align-items-center gap-3 mb-4">
          <span class="fw-semibold">Quantity:</span>
          <div class="qty-selector">
            <button onclick="changeQty(-1)">−</button>
            <input type="text" id="qtyInput" value="1" readonly>
            <button onclick="changeQty(1)">+</button>
          </div>
        </div>
        <div class="d-flex gap-3 flex-wrap">
          <button class="btn btn-outline-violet btn-lg flex-grow-1" ${product.qty<=0?'disabled':''} onclick="addToCart()"><i class="bi bi-cart-plus me-1"></i> Add to Cart</button>
          <button class="btn btn-coral btn-lg flex-grow-1" ${product.qty<=0?'disabled':''} onclick="buyNow()"><i class="bi bi-lightning-charge-fill me-1"></i> Buy Now</button>
        </div>
        <div class="row mt-4 g-3 small text-muted">
          <div class="col-4 text-center"><i class="bi bi-truck fs-5 text-violet d-block mb-1"></i>Free Delivery</div>
          <div class="col-4 text-center"><i class="bi bi-arrow-counterclockwise fs-5 text-violet d-block mb-1"></i>7-Day Returns</div>
          <div class="col-4 text-center"><i class="bi bi-shield-check fs-5 text-violet d-block mb-1"></i>Secure Payment</div>
        </div>
      </div>
    </div>

    ${related.length ? `
    <div class="mt-5">
      <h4 class="mb-4">You May Also Like</h4>
      <div class="row g-4">${related.map(productCardHtml).join('')}</div>
    </div>` : ''}
  `;
  initReveal();
}

function changeQty(d){
  qty = Math.max(1, Math.min(product.qty, qty + d));
  document.getElementById('qtyInput').value = qty;
}

async function addToCart(){
  try { await Cart.add(product.id, qty); } catch {}
}

async function buyNow(){
  try {
    await Cart.add(product.id, qty);
    window.location.href = 'checkout.html';
  } catch {}
}

loadAndRender();
</script>
</body>
</html>
